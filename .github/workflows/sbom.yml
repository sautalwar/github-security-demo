# ============================================================
# Software Bill of Materials (SBOM) Generation
# GitLab equivalent: Built-in Dependency List / SBOM
# ============================================================
# VALUE: Generates a complete inventory of all software components,
# their versions, and licenses. Required for compliance frameworks
# like Executive Order 14028 and FDA cybersecurity guidance.

name: "📦 SBOM Generation"

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  generate-sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Syft (SBOM generator)
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate CycloneDX SBOM (application)
        run: |
          syft dir:. -o cyclonedx-json=sbom-cyclonedx.json
          syft dir:. -o spdx-json=sbom-spdx.json

      - name: Generate container SBOM
        run: |
          docker build -t security-demo:sbom .
          syft security-demo:sbom -o cyclonedx-json=sbom-container-cyclonedx.json
          syft security-demo:sbom -o spdx-json=sbom-container-spdx.json

      - name: Create SBOM summary
        run: |
          echo "# Software Bill of Materials (SBOM)" > sbom-summary.md
          echo "" >> sbom-summary.md
          echo "**Generated:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> sbom-summary.md
          echo "**Commit:** ${{ github.sha }}" >> sbom-summary.md
          echo "**Branch:** ${{ github.ref_name }}" >> sbom-summary.md
          echo "" >> sbom-summary.md
          
          echo "## Application Components" >> sbom-summary.md
          echo "" >> sbom-summary.md
          TOTAL_APP=$(jq '.components | length' sbom-cyclonedx.json 2>/dev/null || echo "N/A")
          echo "Total components: **$TOTAL_APP**" >> sbom-summary.md
          echo "" >> sbom-summary.md
          
          echo "## Container Components" >> sbom-summary.md
          echo "" >> sbom-summary.md
          TOTAL_CONTAINER=$(jq '.components | length' sbom-container-cyclonedx.json 2>/dev/null || echo "N/A")
          echo "Total components: **$TOTAL_CONTAINER**" >> sbom-summary.md
          echo "" >> sbom-summary.md
          
          echo "## Formats Generated" >> sbom-summary.md
          echo "- CycloneDX (JSON) - Application & Container" >> sbom-summary.md
          echo "- SPDX (JSON) - Application & Container" >> sbom-summary.md

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
            sbom-container-cyclonedx.json
            sbom-container-spdx.json
            sbom-summary.md
          retention-days: 90

      - name: Attach SBOM to release
        if: github.event_name == 'release'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = [
              'sbom-cyclonedx.json',
              'sbom-spdx.json',
              'sbom-container-cyclonedx.json',
              'sbom-container-spdx.json'
            ];
            for (const file of files) {
              const content = fs.readFileSync(file);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: context.payload.release.id,
                name: file,
                data: content
              });
            }

      - name: Scan SBOM for known vulnerabilities
        run: |
          # Use Grype to scan the generated SBOM
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype sbom:sbom-cyclonedx.json -o table > sbom-vuln-report.txt 2>&1 || true
          grype sbom:sbom-cyclonedx.json -o json > sbom-vuln-report.json 2>&1 || true
          
          echo "" >> sbom-summary.md
          echo "## Vulnerability Scan Against SBOM" >> sbom-summary.md
          VULN_COUNT=$(jq '.matches | length' sbom-vuln-report.json 2>/dev/null || echo "N/A")
          echo "Known vulnerabilities found: **$VULN_COUNT**" >> sbom-summary.md

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-vuln-reports
          path: |
            sbom-vuln-report.txt
            sbom-vuln-report.json
          retention-days: 90
